name: Build & Deploy to Plesk

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_URL: ${{ secrets.AUTH_URL }}
      AUTH_TRUST_HOST: "true"
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SMS_API_URL: ${{ secrets.SMS_API_URL }}
      SMS_USERNAME: ${{ secrets.SMS_USERNAME }}
      SMS_PASSWORD: ${{ secrets.SMS_PASSWORD }}
      NEXT_PUBLIC_APP_NAME: "PulseBC"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Build Next.js
        run: pnpm build

      - name: Prepare deploy package
        shell: python
        run: |
          import os, shutil, re, json, glob

          base = os.getcwd()
          deploy = os.path.join(base, 'deploy')

          # Dynamically find the standalone directory (path varies by workspace root detection)
          server_candidates = glob.glob(os.path.join(base, '.next', 'standalone', '**', 'server.js'), recursive=True)
          if not server_candidates:
              raise FileNotFoundError(f"server.js not found in .next/standalone — build may have failed")
          standalone = os.path.dirname(server_candidates[0])
          print(f"Found standalone at: {standalone}")

          # Copy standalone .next into deploy/.next
          src_next = os.path.join(standalone, '.next')
          dst_next = os.path.join(deploy, '.next')
          shutil.copytree(src_next, dst_next)

          # Copy static into deploy/.next/static
          static_src = os.path.join(base, '.next', 'static')
          static_dst = os.path.join(dst_next, 'static')
          if os.path.isdir(static_dst):
              shutil.rmtree(static_dst)
          shutil.copytree(static_src, static_dst)

          # Copy public
          shutil.copytree(os.path.join(base, 'public'), os.path.join(deploy, 'public'))

          # Copy web.config with deploy timestamp (triggers iisnode restart)
          import time as _time
          wc_src = os.path.join(base, 'web.config')
          with open(wc_src, 'r') as f:
              wc = f.read()
          wc = re.sub(r'\s*<!-- deployed:.*?-->\s*', '', wc)
          wc = wc.replace('</configuration>', f'  <!-- deployed: {_time.strftime("%Y-%m-%d %H:%M:%S")} -->\n</configuration>')
          with open(os.path.join(deploy, 'web.config'), 'w') as f:
              f.write(wc)

          # Copy iisnode-entry.js (required entry point for IIS)
          shutil.copy2(os.path.join(base, 'iisnode-entry.js'), deploy)

          # Copy node_modules from standalone root
          src_nm = os.path.join(standalone, 'node_modules')
          if os.path.isdir(src_nm):
              shutil.copytree(src_nm, os.path.join(deploy, 'node_modules'))

          # Copy package.json from standalone
          pkg = os.path.join(standalone, 'package.json')
          if os.path.isfile(pkg):
              shutil.copy2(pkg, deploy)

          # Generate iisnode-compatible server.js
          server_path = os.path.join(standalone, 'server.js')
          with open(server_path, 'r') as f:
              content = f.read()
          match = re.search(r'const nextConfig = ({.*?})\n', content, re.DOTALL)
          if match:
              next_config_json = match.group(1)
              iis_server = (
                  "const path = require('path')\n"
                  "const { createServer } = require('http')\n"
                  "\n"
                  "const dir = path.join(__dirname)\n"
                  "process.env.NODE_ENV = 'production'\n"
                  "process.chdir(__dirname)\n"
                  "\n"
                  "const nextConfig = " + next_config_json + "\n"
                  "\n"
                  "process.env.__NEXT_PRIVATE_STANDALONE_CONFIG = JSON.stringify(nextConfig)\n"
                  "\n"
                  "const next = require('next')\n"
                  "const app = next({ dev: false, dir, conf: nextConfig })\n"
                  "const handle = app.getRequestHandler()\n"
                  "\n"
                  "app.prepare().then(() => {\n"
                  "  const server = createServer((req, res) => {\n"
                  "    handle(req, res)\n"
                  "  })\n"
                  "  const port = process.env.PORT || 3000\n"
                  "  server.listen(port, () => {\n"
                  "    console.log('> Ready on', port)\n"
                  "  })\n"
                  "})\n"
              )
              with open(os.path.join(deploy, 'server.js'), 'w') as f:
                  f.write(iis_server)
              print("Generated iisnode-compatible server.js")
          else:
              shutil.copy2(server_path, deploy)
              print("WARNING: Could not extract nextConfig, using original server.js")

          # Sync Prisma client from pnpm store
          import glob
          prisma_pattern = os.path.join(base, 'node_modules', '.pnpm',
              '@prisma+client@*', 'node_modules', '.prisma', 'client')
          prisma_dirs = glob.glob(prisma_pattern)
          if prisma_dirs:
              prisma_src = prisma_dirs[0]
              prisma_dst = os.path.join(deploy, 'node_modules', '.prisma', 'client')
              os.makedirs(prisma_dst, exist_ok=True)
              for fname in os.listdir(prisma_src):
                  fpath = os.path.join(prisma_src, fname)
                  if os.path.isfile(fpath):
                      shutil.copy2(fpath, prisma_dst)
              print("Prisma client synced")

          total = sum(len(files) for _, _, files in os.walk(deploy))
          print(f"Deploy package ready: {total} files")

      - name: Create .env on deploy
        shell: bash
        run: |
          echo "DATABASE_URL=${DATABASE_URL}" > deploy/.env
          echo "AUTH_SECRET=${AUTH_SECRET}" >> deploy/.env
          echo "AUTH_URL=${AUTH_URL}" >> deploy/.env
          echo "AUTH_TRUST_HOST=true" >> deploy/.env
          echo "SENDGRID_API_KEY=${SENDGRID_API_KEY}" >> deploy/.env
          echo "SMS_API_URL=${SMS_API_URL}" >> deploy/.env
          echo "SMS_USERNAME=${SMS_USERNAME}" >> deploy/.env
          echo "SMS_PASSWORD=${SMS_PASSWORD}" >> deploy/.env
          echo "NEXT_PUBLIC_APP_NAME=PulseBC" >> deploy/.env
          echo "NODE_ENV=production" >> deploy/.env

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: /httpdocs/
          dangerous-clean-slate: true
