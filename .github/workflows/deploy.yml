name: Build & Deploy to Plesk

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_URL: ${{ secrets.AUTH_URL }}
      AUTH_TRUST_HOST: "true"
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SMS_API_URL: ${{ secrets.SMS_API_URL }}
      SMS_USERNAME: ${{ secrets.SMS_USERNAME }}
      SMS_PASSWORD: ${{ secrets.SMS_PASSWORD }}
      NEXT_PUBLIC_APP_NAME: "PulseBC"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Build Next.js
        run: pnpm build

      - name: Deploy via FTP
        shell: python
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          import os, re, glob, ftplib, shutil, time, hashlib
          from io import BytesIO

          base = os.getcwd()
          FTP_HOST = os.environ['FTP_HOST']
          FTP_USER = os.environ['FTP_USER']
          FTP_PASS = os.environ['FTP_PASS']
          REMOTE_DIR = '/httpdocs'

          # --- Find standalone dir ---
          server_candidates = glob.glob(os.path.join(base, '.next', 'standalone', '**', 'server.js'), recursive=True)
          if not server_candidates:
              raise FileNotFoundError('server.js not found in .next/standalone')
          standalone = os.path.dirname(server_candidates[0])
          print(f'Standalone: {standalone}')

          # --- Copy static into standalone .next ---
          static_src = os.path.join(base, '.next', 'static')
          static_dst = os.path.join(standalone, '.next', 'static')
          if os.path.isdir(static_dst):
              shutil.rmtree(static_dst)
          shutil.copytree(static_src, static_dst)
          print('Static assets merged into standalone')

          # --- Ensure next.js main entry + key server files exist in standalone ---
          # nft sometimes skips next/dist/server/next.js on Windows; copy from full install
          next_files_to_ensure = [
              os.path.join('next', 'dist', 'server', 'next.js'),
              os.path.join('next', 'dist', 'server', 'next.js.map'),
          ]
          for rel in next_files_to_ensure:
              dst = os.path.join(standalone, 'node_modules', rel)
              src = os.path.join(base, 'node_modules', rel)
              if not os.path.exists(dst) and os.path.exists(src):
                  os.makedirs(os.path.dirname(dst), exist_ok=True)
                  shutil.copy2(src, dst)
                  print(f'Copied missing {rel} to standalone')
              else:
                  print(f'OK {rel}: {"present" if os.path.exists(dst) else "MISSING in both!"}')

          # --- Generate iisnode-compatible server.js ---
          with open(os.path.join(standalone, 'server.js'), 'r') as f:
              content = f.read()
          match = re.search(r'const nextConfig = ({.*?})\n', content, re.DOTALL)
          if match:
              iis_server = (
                  "const path = require('path')\n"
                  "const { createServer } = require('http')\n\n"
                  "const dir = path.join(__dirname)\n"
                  "process.env.NODE_ENV = 'production'\n"
                  "process.chdir(__dirname)\n\n"
                  "const nextConfig = " + match.group(1) + "\n\n"
                  "process.env.__NEXT_PRIVATE_STANDALONE_CONFIG = JSON.stringify(nextConfig)\n\n"
                  "// Use require('next') — next/dist/server/next.js is traced by nft and present\n"
                  "// in standalone node_modules. Do NOT parseInt(PORT): iisnode passes a named\n"
                  "// pipe path that server.listen() accepts natively.\n"
                  "const next = require('next')\n"
                  "const app = next({ dev: false, dir, conf: nextConfig })\n"
                  "const handle = app.getRequestHandler()\n\n"
                  "app.prepare().then(() => {\n"
                  "  const server = createServer((req, res) => { handle(req, res) })\n"
                  "  const port = process.env.PORT || 3000\n"
                  "  server.listen(port, () => console.log('> PulseBC ready'))\n"
                  "}).catch(err => {\n"
                  "  process.stderr.write('FATAL: ' + err.stack + '\\n')\n"
                  "  process.exit(1)\n"
                  "})\n"
              )
          else:
              iis_server = content
              print('WARNING: could not extract nextConfig, using original server.js')

          # --- FTP helpers ---
          def ftp_connect():
              ftp = ftplib.FTP(FTP_HOST, timeout=60)
              ftp.login(FTP_USER, FTP_PASS)
              return ftp

          def ensure_dir(ftp, path):
              parts = [p for p in path.replace('\\', '/').split('/') if p]
              cur = ''
              for p in parts:
                  cur += '/' + p
                  try:
                      ftp.cwd(cur)
                  except:
                      ftp.mkd(cur)

          def delete_dir(ftp, path):
              try:
                  items = ftp.mlsd(path)
                  for name, facts in items:
                      if name in ('.', '..'):
                          continue
                      full = f'{path}/{name}'
                      if facts.get('type') == 'dir':
                          delete_dir(ftp, full)
                      else:
                          try:
                              ftp.delete(full)
                          except:
                              pass
                  try:
                      ftp.rmd(path)
                  except:
                      pass
              except:
                  pass

          def upload_file(ftp, local, remote):
              ensure_dir(ftp, '/'.join(remote.split('/')[:-1]))
              with open(local, 'rb') as f:
                  ftp.storbinary(f'STOR {remote}', f)

          def upload_dir(ftp, local_base, remote_base, label=''):
              files = [(os.path.join(r, f), f'{remote_base}/{os.path.relpath(os.path.join(r, f), local_base).replace(chr(92), "/")}')
                       for r, _, fs in os.walk(local_base) for f in fs]
              print(f'Uploading {label}: {len(files)} files')
              for i, (lp, rp) in enumerate(files, 1):
                  if i % 100 == 0:
                      print(f'  {i}/{len(files)}')
                  try:
                      upload_file(ftp, lp, rp)
                  except Exception as e:
                      print(f'  RETRY {rp}: {e}')
                      try:
                          ftp2 = ftp_connect()
                          ftp.__dict__.update(ftp2.__dict__)
                          upload_file(ftp, lp, rp)
                      except Exception as e2:
                          print(f'  FAILED {rp}: {e2}')

          # --- Connect ---
          print('Connecting to FTP...')
          ftp = ftp_connect()
          print('Connected')

          # --- Delete old .next and re-upload ---
          print('Deleting old .next on server...')
          delete_dir(ftp, f'{REMOTE_DIR}/.next')
          print('Deleted. Uploading new .next...')
          upload_dir(ftp, os.path.join(standalone, '.next'), f'{REMOTE_DIR}/.next', '.next')

          # --- Upload node_modules from standalone (contains 'next' and runtime deps) ---
          print('Uploading node_modules from standalone...')
          upload_dir(ftp, os.path.join(standalone, 'node_modules'), f'{REMOTE_DIR}/node_modules', 'node_modules')

          # --- Sync Prisma client ---
          prisma_pattern = os.path.join(base, 'node_modules', '.pnpm', '@prisma+client@*', 'node_modules', '.prisma', 'client')
          prisma_dirs = glob.glob(prisma_pattern)
          if prisma_dirs:
              prisma_dst = f'{REMOTE_DIR}/node_modules/.prisma/client'
              for fname in os.listdir(prisma_dirs[0]):
                  fpath = os.path.join(prisma_dirs[0], fname)
                  if os.path.isfile(fpath):
                      upload_file(ftp, fpath, f'{prisma_dst}/{fname}')
              print('Prisma client synced')

          # --- Upload public ---
          print('Uploading public/...')
          upload_dir(ftp, os.path.join(base, 'public'), f'{REMOTE_DIR}/public', 'public')

          # --- Upload critical files ---
          ts = time.strftime('%Y-%m-%d %H:%M:%S')

          # server.js
          ftp.storbinary(f'STOR {REMOTE_DIR}/server.js', BytesIO(iis_server.encode()))
          print('Uploaded server.js')

          # iisnode-entry.js
          with open(os.path.join(base, 'iisnode-entry.js'), 'rb') as f:
              ftp.storbinary(f'STOR {REMOTE_DIR}/iisnode-entry.js', f)
          print('Uploaded iisnode-entry.js')

          # web.config with timestamp to force restart
          with open(os.path.join(base, 'web.config'), 'r') as f:
              wc = f.read()
          wc = re.sub(r'\s*<!-- deployed:.*?-->\s*', '', wc)
          wc = wc.replace('</configuration>', f'  <!-- deployed: {ts} -->\n</configuration>')
          ftp.storbinary(f'STOR {REMOTE_DIR}/web.config', BytesIO(wc.encode()))
          print(f'Uploaded web.config (deployed: {ts}) — iisnode restart triggered')

          # .env
          env_lines = [
              f'DATABASE_URL={os.environ["DATABASE_URL"]}',
              f'AUTH_SECRET={os.environ["AUTH_SECRET"]}',
              f'AUTH_URL={os.environ["AUTH_URL"]}',
              'AUTH_TRUST_HOST=true',
              f'SENDGRID_API_KEY={os.environ["SENDGRID_API_KEY"]}',
              f'SMS_API_URL={os.environ["SMS_API_URL"]}',
              f'SMS_USERNAME={os.environ["SMS_USERNAME"]}',
              f'SMS_PASSWORD={os.environ["SMS_PASSWORD"]}',
              'NEXT_PUBLIC_APP_NAME=PulseBC',
              'NODE_ENV=production',
          ]
          ftp.storbinary(f'STOR {REMOTE_DIR}/.env', BytesIO('\n'.join(env_lines).encode()))
          print('Uploaded .env')

          ftp.quit()
          print(f'\nDeploy complete at {ts}')
          print('Visit https://yourdebtcollectors.com')
